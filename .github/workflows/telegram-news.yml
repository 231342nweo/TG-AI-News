name: Send AI News To Telegram

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run once or keep running every 5 minutes"
        required: true
        default: daemon
        type: choice
        options:
          - daemon
          - once
      cycles:
        description: "Daemon cycles, max 60"
        required: false
        default: "60"
  push:
    branches:
      - main
    paths-ignore:
      - "ai-news-telegram-radar/data/source-state.json"
  schedule:
    # Native GitHub cron backup. The daemon mode below is the primary 5-minute runner.
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: ai-news-telegram-radar
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: ai-news-telegram-radar
    steps:
      - uses: actions/checkout@v4
      - name: Apply pending Codex patch
        working-directory: .
        run: |
          if [ -f codex-sync.patch.b64 ]; then
            python3 -c "import base64, pathlib; encoded = pathlib.Path('codex-sync.patch.b64').read_text(encoding='utf-8').strip(); raw = base64.b64decode(encoded); pathlib.Path('codex-sync.patch').write_bytes(raw); print(f'Decoded Codex patch: {len(raw)} bytes')"
          fi
          if [ -f codex-sync.patch ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git apply --check --verbose codex-sync.patch
            git apply codex-sync.patch
            rm -f codex-sync.patch
            git rm -f --ignore-unmatch codex-sync.patch.b64
            git add ai-news-telegram-radar
            if git diff --cached --quiet; then
              echo "No pending Codex patch changes."
            else
              git commit -m "Improve AI news source collectors [skip ci]"
              git pull --rebase --autostash
              git push
            fi
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Choose run mode
        id: plan
        run: |
          mode="once"
          cycles="1"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "daemon" ]; then
            mode="daemon"
            cycles="${{ inputs.cycles }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            mode="daemon"
            cycles="60"
          fi
          case "$cycles" in
            ''|*[!0-9]*) cycles="1" ;;
          esac
          if [ "$cycles" -lt 1 ]; then
            cycles="1"
          fi
          if [ "$cycles" -gt 60 ]; then
            cycles="60"
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "cycles=$cycles" >> "$GITHUB_OUTPUT"
      - name: Run digest cycles
        env:
          TZ: Asia/Shanghai
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_TRANSLATION_MODEL: ${{ secrets.OPENAI_TRANSLATION_MODEL }}
          OPENAI_TRANSLATION_API: chat
          OPENAI_TRANSLATION_ENABLED: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cycles="${{ steps.plan.outputs.cycles }}"
          for cycle in $(seq 1 "$cycles"); do
            echo "::group::AI news cycle $cycle/$cycles"
            python -m ai_news_radar run --config config/sources.json --send --show
            git add data/source-state.json
            if git diff --cached --quiet; then
              echo "No state changes to commit."
            else
              git commit -m "Update AI news source state [skip ci]"
              git pull --rebase --autostash
              git push
            fi
            echo "::endgroup::"
            if [ "$cycle" -lt "$cycles" ]; then
              sleep 300
            fi
          done
      - name: Continue daemon
        if: ${{ steps.plan.outputs.mode == 'daemon' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sleep 300
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/telegram-news.yml/dispatches" \
            -d '{"ref":"main","inputs":{"mode":"daemon","cycles":"60"}}'
