name: Send AI News To Telegram

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: ai-news-telegram-radar
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-news-telegram-radar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Build and send digest
        env:
          TZ: Asia/Shanghai
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_TRANSLATION_MODEL: ${{ secrets.OPENAI_TRANSLATION_MODEL }}
          OPENAI_TRANSLATION_API: chat
          OPENAI_TRANSLATION_ENABLED: "1"
        run: python -m ai_news_radar run --config config/sources.json --send --show
      - name: Persist source state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source-state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update AI news source state [skip ci]"
            git push
          fi
